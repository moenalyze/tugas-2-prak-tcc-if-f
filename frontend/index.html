<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Notes Praktikum</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px auto; max-width: 600px; }
        .note-card { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 8px; background-color: #f9f9f9;}
        input, textarea { width: 100%; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; color: white;}
        #btn-simpan { background-color: #28a745; width: 100%; font-weight: bold;}
        .btn-edit { background-color: #ffc107; color: black; margin-right: 5px; }
        .btn-hapus { background-color: #dc3545; }
    </style>
</head>
<body>
    <h2>Aplikasi Notes Tugas TCC</h2>
    
    <input type="hidden" id="note-id"> <input type="text" id="judul" placeholder="Masukkan Judul Catatan...">
    <textarea id="isi" rows="4" placeholder="Masukkan Isi Catatan..."></textarea>
    <button id="btn-simpan" onclick="simpanCatatan()">Simpan Catatan</button>

    <hr style="margin: 30px 0;">
    
    <h3>Daftar Catatan</h3>
    <div id="daftar-catatan">
        <p>Belum ada catatan nih...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
